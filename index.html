<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Workshop Availability | Creatis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f7f9;
  --surface:#ffffff;
  --border:#e0e0e0;
  --text:#1a1a1a;
  --muted:#888;
  --faint:#bbb;
  --chip:#f1f1f1;
  --radius-sm:8px;
  --radius-md:12px;
  --radius-pill:99px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111113;
    --surface:#1c1c1e;
    --border:#2e2e30;
    --text:#f0f0f0;
    --muted:#888;
    --faint:#555;
    --chip:#2a2a2c;
  }
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
}
.app{max-width:560px;margin:0 auto;padding:1.25rem 1rem 3rem}
.header{display:flex;align-items:baseline;gap:8px;margin-bottom:1.25rem}
.header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.header span{font-size:13px;color:var(--muted)}
.filter-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem 1.125rem;margin-bottom:1rem}
.filter-label{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:12px}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px}
.filter-pill{
  font-size:13px;padding:5px 14px;border-radius:var(--radius-pill);
  background:var(--chip);color:var(--muted);border:1px solid var(--border);
  cursor:pointer;transition:transform .12s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.filter-pill:hover{transform:scale(1.05)}
.filter-pill:active{transform:scale(.95)}
.filter-pill.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.next-card{
  background:var(--chip);border-radius:var(--radius-sm);
  padding:.75rem 1rem;margin-bottom:.75rem;
  font-size:13px;color:var(--muted);
}
.next-card strong{color:var(--text);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:.625rem;overflow:hidden}
.date-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:.875rem 1.125rem;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.date-row:hover{background:var(--chip)}
.date-name{font-size:14px;font-weight:600;color:var(--text)}
.date-badge{font-size:11px;padding:3px 10px;border-radius:var(--radius-pill)}
.badge-avail{background:#e1f5ee;color:#085041}
.badge-partial{background:#faeeda;color:#633806}
.badge-sunday{background:#eeedfe;color:#3c3489}
.badge-holiday{background:#fcebeb;color:#791f1f}
.badge-soldout{background:var(--chip);color:var(--muted)}
.slots-wrap{border-top:1px solid var(--border);padding:.75rem 1.125rem;display:none;gap:8px;flex-wrap:wrap}
.slots-wrap.open{display:flex}
.slot-btn{
  font-size:13px;padding:6px 16px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);color:var(--text);
  cursor:pointer;text-decoration:none;display:inline-block;
  -webkit-tap-highlight-color:transparent;
}
.slot-btn:hover{border-color:var(--muted)}
.slot-btn.dis{
  opacity:.35;cursor:not-allowed;pointer-events:none;
  color:var(--muted);
}
.empty{font-size:14px;color:var(--faint);text-align:center;padding:1.5rem 0}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Workshop Availability</h1>
    <span>by Creatis</span>
  </div>

  <div class="filter-card">
    <div class="filter-label">Group size</div>
    <div class="filter-pills" id="group-pills"></div>
  </div>

  <div class="filter-card" style="margin-bottom:.75rem">
    <div class="filter-label">Month</div>
    <div class="filter-pills" id="month-pills"></div>
  </div>

  <div id="next-card" class="next-card"></div>
  <div id="date-list"></div>

</div>
<script>
const BOOK_URL = "https://creatis.in/collections/make-at-creatis";

const fullHolidays = {
  "2026-01-14":"Sankranti",
  "2026-01-26":"Republic Day",
  "2026-03-04":"Holi",
  "2026-03-18":"Eid al-Fitr",
  "2026-05-27":"Eid ul-Adha",
  "2026-07-26":"Muharram",
  "2026-08-15":"Independence Day",
  "2026-08-28":"Raksha Bandhan",
  "2026-10-20":"Dussera",
  "2026-11-08":"Diwali",
  "2026-11-09":"Diwali",
  "2026-11-10":"Diwali",
  "2026-11-11":"Bhai Duj"
};
for (let d = 1; d <= 30; d++) {
  fullHolidays[`2026-06-${String(d).padStart(2,"0")}`] = "Summer Hours";
}

const partialDayHolidays = {"2026-03-03":"Holi"};
for (let d = 1; d <= 31; d++) {
  partialDayHolidays[`2026-05-${String(d).padStart(2,"0")}`] = "Summer Hours";
}

const soldOutSlots = [
  "2025-12-25-11","2025-12-30-15",
  "2026-01-07-15","2026-01-16-15","2026-01-22-15","2026-01-31-15",
  "2026-02-02-15","2026-02-07-15","2026-02-18-15","2026-02-27-15",
  "2026-03-02-15","2026-03-05-15","2026-03-06-11","2026-03-17-11",
  "2026-04-06-11","2026-04-04-15","2026-04-07-15"
];

const timeSlots = [11, 15];
let groupSize = 1;
let activeMonth = null;

function getISTNow() {
  const n = new Date();
  return new Date(n.getTime() + n.getTimezoneOffset() * 60000 + 5.5 * 3600000);
}
function getTodayIST() {
  const d = getISTNow(); d.setHours(0,0,0,0); return d;
}
function fmt(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function isPastCutoff(date, h) {
  const now = getISTNow(), today = getTodayIST();
  const sd = new Date(date); sd.setHours(0,0,0,0);
  if (sd.getTime() !== today.getTime()) return false;
  return h === 11 ? now.getHours() >= 10 : now.getHours() >= 14;
}

function getMonths() {
  const today = getTodayIST(), months = [];
  for (let i = 0; i <= 11; i++) {
    const d = new Date(today.getFullYear(), today.getMonth() + i, 1);
    months.push({ year: d.getFullYear(), month: d.getMonth(), label: d.toLocaleDateString("en-IN", { month: "short", year: "numeric" }) });
  }
  return months;
}

function buildGroupPills() {
  const el = document.getElementById("group-pills");
  [["1–3 people", 1], ["4+ people", 4]].forEach(([label, val]) => {
    const b = document.createElement("button");
    b.className = "filter-pill" + (val === groupSize ? " active" : "");
    b.textContent = label;
    b.onclick = () => {
      groupSize = val;
      document.querySelectorAll("#group-pills .filter-pill").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      updateAll();
    };
    el.appendChild(b);
  });
}

function buildMonthPills() {
  const el = document.getElementById("month-pills");
  const months = getMonths();
  if (!activeMonth) activeMonth = `${months[0].year}-${months[0].month}`;
  months.forEach(m => {
    const key = `${m.year}-${m.month}`;
    const b = document.createElement("button");
    b.className = "filter-pill" + (key === activeMonth ? " active" : "");
    b.textContent = m.label;
    b.onclick = () => {
      activeMonth = key;
      document.querySelectorAll("#month-pills .filter-pill").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      renderDates();
    };
    el.appendChild(b);
  });
}

function getNextSlot() {
  const today = getTodayIST();
  for (let i = 0; i < 120; i++) {
    const date = new Date(today); date.setDate(date.getDate() + i);
    const iso = fmt(date), day = date.getDay();
    if (fullHolidays[iso]) continue;
    for (let t of timeSlots) {
      if (partialDayHolidays[iso] && t === 15) continue;
      if (soldOutSlots.includes(`${iso}-${t}`)) continue;
      if (day === 0 && groupSize < 4) continue;
      if (isPastCutoff(date, t)) continue;
      return { date, time: t };
    }
  }
  return null;
}

function updateAll() { renderNext(); renderDates(); }

function renderNext() {
  const box = document.getElementById("next-card");
  const slot = getNextSlot();
  if (!slot) { box.innerHTML = "No upcoming slots available."; return; }
  const today = getTodayIST();
  const slotDay = new Date(slot.date); slotDay.setHours(0,0,0,0);
  const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  let label;
  if (slotDay.getTime() === today.getTime()) label = "Today";
  else if (slotDay.getTime() === tomorrow.getTime()) label = "Tomorrow";
  else label = slot.date.toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long" });
  box.innerHTML = `Next available: <strong>${label} at ${slot.time === 11 ? "11 AM" : "3 PM"}</strong>`;
}

function renderDates() {
  const dl = document.getElementById("date-list");
  dl.innerHTML = "";
  const [yr, mi] = activeMonth.split("-").map(Number);
  const days = new Date(yr, mi + 1, 0).getDate();
  const today = getTodayIST();
  let any = false;

  for (let d = 1; d <= days; d++) {
    const date = new Date(yr, mi, d);
    if (date < today) continue;
    const iso = fmt(date), day = date.getDay();
    let badgeCls = "badge-avail", note = "Available";

    if (fullHolidays[iso]) {
      badgeCls = "badge-holiday"; note = fullHolidays[iso] + " — closed";
    } else if (partialDayHolidays[iso]) {
      badgeCls = "badge-partial"; note = "11 AM only";
    } else if (day === 0) {
      badgeCls = "badge-sunday"; note = groupSize >= 4 ? "Groups of 4+" : "4+ people only";
    } else {
      const sc = timeSlots.filter(t => soldOutSlots.includes(`${iso}-${t}`)).length;
      if (sc === timeSlots.length) { badgeCls = "badge-soldout"; note = "Sold out"; }
      else if (sc > 0) { badgeCls = "badge-partial"; note = "Partially available"; }
    }

    any = true;
    const wrapper = document.createElement("div");
    wrapper.className = "card";

    const row = document.createElement("div");
    row.className = "date-row";
    row.innerHTML = `<span class="date-name">${date.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" })}</span><span class="date-badge ${badgeCls}">${note}</span>`;

    const slotsWrap = document.createElement("div");
    slotsWrap.className = "slots-wrap";

    row.onclick = () => {
      const wasOpen = slotsWrap.classList.contains("open");
      document.querySelectorAll(".slots-wrap.open").forEach(s => s.classList.remove("open"));
      if (!wasOpen) {
        slotsWrap.innerHTML = "";
        timeSlots.forEach(t => {
          const disabled =
            fullHolidays[iso] ||
            (partialDayHolidays[iso] && t === 15) ||
            soldOutSlots.includes(`${iso}-${t}`) ||
            (day === 0 && groupSize < 4) ||
            isPastCutoff(date, t);

          if (disabled) {
            const btn = document.createElement("span");
            btn.className = "slot-btn dis";
            btn.textContent = t === 11 ? "11:00 AM" : "3:00 PM";
            slotsWrap.appendChild(btn);
          } else {
            const a = document.createElement("a");
            a.className = "slot-btn";
            a.href = BOOK_URL;
            a.target = "_blank";
            a.rel = "noopener";
            a.textContent = t === 11 ? "11:00 AM" : "3:00 PM";
            slotsWrap.appendChild(a);
          }
        });
        slotsWrap.classList.add("open");
      }
    };

    wrapper.appendChild(row);
    wrapper.appendChild(slotsWrap);
    dl.appendChild(wrapper);
  }

  if (!any) dl.innerHTML = '<div class="empty">No dates to show for this month.</div>';
}

buildGroupPills();
buildMonthPills();
updateAll();
</script>
</body>
</html>
